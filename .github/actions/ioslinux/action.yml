name: "IOS Linux Build"
description: "IOS Linux Build"
runs:
  using: "composite"
  steps:
    - name: Run RN Community CLI
      run: npx @react-native-community/cli doctor
      shell: bash

    - name: Install example
      run: yarn --cwd ./example install
      shell: bash

    - run: |
        cd example/ios
        pod install --repo-update
      shell: bash
    - run: xcodebuild -workspace ios/YourAppName.xcworkspace \
        -scheme YourAppName \
        -sdk iphoneos  \
        -configuration Release \
        -derivedDataPath build
      shell: bash
    # - name: Build iOS App
    #   run: nnpx react-native run-ios --mode Release
    #   shell: bash
