name: "IOS Linux Build"
description: "IOS Linux Build"
runs:
  using: "composite"
  steps:
    - name: Setup Project Workspace
      run: |
        yarn install
        yarn prepare
      shell: bash

    - name: Setup Example Workspace
      run: |
        cd example
        yarn install
      shell: bash

    - name: Install Pods
      run: |
          cd example/ios
          pod install --repo-update
      shell: bash

    # FIX 1: Explicitly bundle the JS inside the native app resources root folder
    - name: Compile Target JavaScript Entry Bundle
      run: |
        cd example
        npx react-native bundle \
          --entry-file index.js \
          --platform ios \
          --dev false \
          --bundle-output ios/main.jsbundle \
          --assets-dest ios
      shell: bash

    # FIX 2: Enforce a clean build workspace to stop older 'Release' app artifacts from being cached
    - name: Clean Previous Builds
      run: |
        cd example/ios
        xcodebuild clean -workspace example.xcworkspace -scheme example -configuration Debug
      shell: bash

    # FIX 3: Force the compilation process to target 'Debug' layout parameters explicitly
    - name: Compile Simulator Target Binary Archive
      run: |
        xcodebuild \
          -workspace example/ios/example.xcworkspace \
          -scheme example \
          -configuration Debug \
          -sdk iphonesimulator \
          -derivedDataPath example/ios/build \
          ONLY_ACTIVE_ARCH=NO
      shell: bash

    # FIX 4: Explicitly package the Debug-iphonesimulator wrapper path inside the compression routine
    - name: Compress App for Distribution Artifacts
      run: |
        mkdir -p build-output
        cp -R example/ios/build/Build/Products/Debug-iphonesimulator/example.app build-output/
        cd build-output && zip -r ios-simulator-build.zip example.app
      shell: bash

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ios-simulator-app
        path: build-output/ios-simulator-build.zip