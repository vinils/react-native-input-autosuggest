name: "IOS Linux Build"
description: "IOS Linux Build"
runs:
  using: "composite"
  steps:
    - name: Install example
      run: yarn --cwd ./example install
      shell: bash

    - run: |
        cd example/ios
        pod install --repo-update
      shell: bash

    # - name: Build iOS (Simulator)
    #   run: |
    #     cd example/ios
    #     xcodebuild -workspace example.xcworkspace \
    #       -scheme example \
    #       -configuration Release \
    #       -sdk iphonesimulator \
    #       -derivedDataPath build
    #   shell: bash

    - name: Build iOS (Simulator)
      run: |
        cd example/ios
        xcodebuild archive /
        -workspace example.xcworkspace /
        -scheme example /
        -archivePath build/YourApp.xcarchive
      shell: bash

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-build-output
        path: example/ios/build/*.ipa # Or paths to .app, .xcarchive
