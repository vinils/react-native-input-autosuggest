name: "IOS Linux Build"
description: "IOS Linux Build"
runs:
  using: "composite"
  steps:
    - name: Setup Project Workspace
      run: |
        yarn install
        yarn prepare
      shell: bash

    - name: Setup Example Workspace
      run: |
        cd example
        yarn install
      shell: bash

    - name: Build Production JS Bundle for iOS Simulator
      run: |
        cd example
        npx react-native bundle \
          --entry-file index.js \
          --platform ios \
          --dev false \
          --bundle-output ios/main.jsbundle \
          --assets-dest ios
      shell: bash

    - name: Force Inject Bundle into Compiled App Archive
      # This makes sure the bundle is copied into the binary container even if untracked by Xcode project files
      run: |
        mkdir -p example/ios/build/Build/Products/Release-iphonesimulator/example.app
        cp example/ios/main.jsbundle example/ios/build/Build/Products/Release-iphonesimulator/example.app/main.jsbundle
      shell: bash

    - name: Install Pods
      run: |
          cd example/ios
          pod install --repo-update
      shell: bash

    - name: Archive Workspace
      run: |
        cd example/ios
        xcodebuild -workspace example.xcworkspace \
          -scheme example \
          -configuration Release \
          -sdk iphonesimulator \
          -derivedDataPath build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          AD_HOC_CODE_SIGNING_ALLOWED=YES
          # -sdk iphoneos \
      shell: bash

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-ios.app
        path:  /Users/runner/Library/Developer/Xcode/DerivedData/example-eucopdxwvitevtccgdjftrtxicnv/Build/Products/Release-iphonesimulator/example.app


