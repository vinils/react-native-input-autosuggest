name: "IOS Linux Build"
description: "IOS Linux Build"
runs:
  using: "composite"
  steps:
    - name: Install Monorepo Dependencies
      run: yarn install --frozen-lockfile
      shell: bash

    # FIX 1: Compiles root source modules so example package cross-linking doesn't break
    - name: Precompile Root Component Package
      run: yarn prepare 
      shell: bash

    - name: Install Example Application Packages
      run: |
        cd example
        yarn install --frozen-lockfile
      shell: bash

    - name: Generate Offline Production JavaScript Bundle
      run: |
        cd example
        npx react-native bundle \
          --entry-file index.js \
          --platform ios \
          --dev false \
          --bundle-output ios/main.jsbundle \
          --assets-dest ios/
      shell: bash

    - name: Reinstall CocoaPods Dependencies
      run: |
        cd example/ios
        pod deintegrate
        pod cache clean --all
        pod install
      shell: bash

    - name: Clean Xcode Workspaces
      run: |
        cd example/ios
        xcodebuild clean -workspace example.xcworkspace -scheme example -configuration Release
      shell: bash

    - name: Compile Standalone Simulator Binary Archive (Release Build)
      run: |
        xcodebuild \
          -workspace example/ios/example.xcworkspace \
          -scheme example \
          -configuration Release \
          -sdk iphonesimulator \
          -derivedDataPath example/ios/build \
          ONLY_ACTIVE_ARCH=NO
      shell: bash

    - name: Compress App for Distribution Artifacts
      run: |
        mkdir -p build-output
        cp -R example/ios/build/Build/Products/Release-iphonesimulator/example.app build-output/
        cd build-output && zip -r ios-simulator-build.zip example.app
      shell: bash

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ios-simulator-app
        path: build-output/ios-simulator-build.zip