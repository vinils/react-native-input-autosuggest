name: "IOS Linux Build"
description: "IOS Linux Build"
runs:
  using: "composite"
  steps:
    - name: Setup Project Workspace
      run: |
        yarn install --frozen-lockfile
        yarn prepare
      shell: bash

    - name: Setup Example Workspace
      run: |
        cd example
        yarn install --frozen-lockfile
      shell: bash

    - name: Force Disable New Architecture Compilation
      run: |
        echo '{"newArchEnabled": "false"}' > example/ios/Podfile.properties.json
      shell: bash

    - name: Install Pods
      run: |
          cd example/ios
          pod install --repo-update
      shell: bash

    # FIX 1: Generate a true production release offline asset bundle mapping
    - name: Pre-bundle Standalone JavaScript Entry Asset
      run: |
        cd example
        npx react-native bundle \
          --entry-file index.js \
          --platform ios \
          --dev false \
          --bundle-output ios/main.jsbundle \
          --assets-dest ios
      shell: bash

    - name: Clean Previous Build Cache
      run: |
        cd example/ios
        xcodebuild clean -workspace example.xcworkspace -scheme example -configuration Release
      shell: bash

    - name: Compile Standalone Simulator Binary Archive
      run: |
        xcodebuild \
          -workspace example/ios/example.xcworkspace \
          -scheme example \
          -configuration Release \
          -sdk iphonesimulator \
          -derivedDataPath example/ios/build \
          ONLY_ACTIVE_ARCH=NO
      shell: bash

    - name: Force Embed Bundle file into App Package Structure
      run: |
        cp example/ios/main.jsbundle example/ios/build/Build/Products/Release-iphonesimulator/example.app/main.jsbundle
      shell: bash

    - name: Compress App for Distribution Artifacts
      run: |
        mkdir -p build-output
        cp -R example/ios/build/Build/Products/Release-iphonesimulator/example.app build-output/
        cd build-output && zip -r ios-simulator-build.zip example.app
      shell: bash

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ios-simulator-app
        path: build-output/ios-simulator-build.zip