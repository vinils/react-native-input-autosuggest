name: "IOS Linux Build"
description: "IOS Linux Build"
runs:
  using: "composite"
  steps:
    - name: Setup Project Workspace
      run: |
        yarn install
        yarn prepare
      shell: bash

    - name: Setup Example Workspace
      run: |
        cd example
        yarn install
      shell: bash

    - name: Install Pods
      run: |
          cd example/ios
          pod install --repo-update
      shell: bash

    - name: Build Production JS Bundle for iOS Simulator
      run: |
        cd example
        npx react-native bundle \
          --entry-file index.js \
          --platform ios \
          --dev false \
          --bundle-output ios/main.jsbundle \
          --assets-dest ios
      shell: bash

    - name: Archive Workspace
      run: |
        cd example/ios
        xcodebuild -workspace example/ios/example.xcworkspace \
          -scheme example \
          -configuration Release \
          -sdk iphonesimulator \
          -derivedDataPath example/ios/build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          AD_HOC_CODE_SIGNING_ALLOWED=YES
          # -sdk iphoneos \
      shell: bash

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-ios.app
        path:  example/ios/build/Build/Products/Debug-iphonesimulator/example.app
