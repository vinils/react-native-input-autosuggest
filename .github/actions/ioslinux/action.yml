name: "IOS Linux Build"
description: "IOS Linux Build"
runs:
  using: "composite"
  steps:
    - name: Install example
      run: yarn --cwd ./example install
      shell: bash

    - run: |
        cd example/ios
        pod install --repo-update
      shell: bash

    # - name: Build iOS (Simulator)
    #   run: |
    #     cd example/ios
    #     xcodebuild -workspace example.xcworkspace \
    #       -scheme example \
    #       -configuration Release \
    #       -sdk iphonesimulator \
    #       -derivedDataPath build
    #   shell: bash

    - name: Build and Archive
      run: |
        cd example/ios
        xcodebuild clean archive \
          -workspace example.xcworkspace \
          -scheme example \
          -configuration Release \
          -archivePath $PWD/build/example.xcarchive \
          CODE_SIGN_IDENTITY="" PROVISIONING_PROFILE="" OTHER_CODE_SIGN_FLAGS="--no-sign"
      shell: bash

    - name: Export IPA
      run: |
        cd example/ios
        xcodebuild -exportArchive \
          -archivePath $PWD/build/example.xcarchive \
          -exportOptionsPlist $PWD/ExportOptions.plist \
          -exportPath $PWD/build
      shell: bash

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-build-output
        path: example/ios/build/*.ipa
