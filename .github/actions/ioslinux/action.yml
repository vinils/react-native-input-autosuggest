name: "IOS Linux Build"
description: "IOS Linux Build"
runs:
  using: "composite"
  steps:
    - name: Setup Project Workspace
      run: |
        yarn install
        yarn prepare
      shell: bash

    - name: Setup Example Workspace
      run: |
        cd example
        yarn install
      shell: bash

    - name: Install Pods
      run: |
          cd example/ios
          pod install --repo-update
      shell: bash

    # FIX 2: Manually pre-bundle the code so the Debug app has zero dependence on a running Metro port
    - name: Pre-bundle Standalone JavaScript Entry Asset
      run: |
        cd example
        npx react-native bundle \
          --entry-file index.js \
          --platform ios \
          --dev true \
          --bundle-output ios/main.jsbundle \
          --assets-dest ios
      shell: bash

    - name: Clean Previous Build Cache
      run: |
        cd example/ios
        xcodebuild clean -workspace example.xcworkspace -scheme example -configuration Debug
      shell: bash

    # FIX 3: Inject the offline bundle argument and disable remote developer script fetching
    - name: Compile Standalone Simulator Binary Archive
      run: |
        xcodebuild \
          -workspace example/ios/example.xcworkspace \
          -scheme example \
          -configuration Debug \
          -sdk iphonesimulator \
          -derivedDataPath example/ios/build \
          ONLY_ACTIVE_ARCH=NO \
          GCC_PREPROCESSOR_DEFINITIONS='$inherited RCT_DEV=0'
      shell: bash

    # FIX 4: Ensure the bundle file is securely present inside the artifact folder structure
    - name: Force Embed Bundle file into App Package Structure
      run: |
        cp example/ios/main.jsbundle example/ios/build/Build/Products/Debug-iphonesimulator/example.app/main.jsbundle
      shell: bash

    - name: Compress App for Distribution Artifacts
      run: |
        mkdir -p build-output
        cp -R example/ios/build/Build/Products/Debug-iphonesimulator/example.app build-output/
        cd build-output && zip -r ios-simulator-build.zip example.app
      shell: bash

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ios-simulator-app
        path: build-output/ios-simulator-build.zip