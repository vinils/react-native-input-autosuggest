name: "IOS Linux Build"
description: "IOS Linux Build"
runs:
  using: "composite"
  steps:
    - name: Run RN Community CLI
      run: npx @react-native-community/cli doctor
      shell: bash

    - name: Install example
      run: yarn --cwd ./example install
      shell: bash

    - run: |
        cd example/ios
        pod install --repo-update
      shell: bash
    - name: Build iOS (Simulator)
      run: |
        cd example/ios
        xcodebuild -workspace example.xcworkspace \
          -scheme example \
          -configuration Release \
          -sdk iphonesimulator \
          -derivedDataPath build
      shell: bash


