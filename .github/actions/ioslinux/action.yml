    - name: Archive Workspace
      run: |
        cd example/ios
        xcodebuild -workspace example.xcworkspace \
          -scheme example \
          -configuration Release \
          -sdk iphonesimulator \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          AD_HOC_CODE_SIGNING_ALLOWED=YES
